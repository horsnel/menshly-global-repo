# ============================================================
# MenshlyGlobal — Auto Article Publisher
# Runs on schedule + manual trigger
# Generates AI articles and commits to repo → triggers Hugo build
#
# SETUP: Add these secrets in GitHub → Settings → Secrets and variables → Actions
#   AI_API_KEY      — Your Cerebras (or compatible) API key
#   PEXELS_API_KEY  — Pexels API key (image source 1)
#   PIXABAY_API_KEY — Pixabay API key (image source 2)
#   FREPIK_API_KEY  — Freepik API key (image source 3)
#   NEWS_API_KEY    — NewsAPI.org key (trending topic inspiration)
#   AI_API_BASE     — API base URL (default: https://api.cerebras.ai/v1)
#   AI_MODEL        — Model name (default: llama-3.3-70b)
# ============================================================

name: Auto Publish Articles

on:
  schedule:
    # Runs at 7:00 AM and 7:00 PM UTC daily (8 AM / 8 PM WAT)
    - cron: '0 7,19 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to generate (leave empty for random)'
        required: false
        default: ''
      topic:
        description: 'Specific topic (leave empty for auto-pick)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate article
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FREPIK_API_KEY: ${{ secrets.FREPIK_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          MANUAL_CATEGORY: ${{ github.event.inputs.category }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
        run: python scripts/auto-generate.py

      - name: Check if article was created
        id: check
        run: |
          if [ -s output/article.md ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "Article generated successfully"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "No article was generated (possibly duplicate or error)"
          fi

      - name: Commit and push article
        if: steps.check.outputs.created == 'true'
        run: |
          SLUG=$(head -10 output/article.md | grep "^slug:" | sed 's/slug: *//' | tr -d '"')
          git config user.name "MenshlyGlobal Bot"
          git config user.email "bot@menshly-global.pages.dev"
          cp output/article.md "content/ai-newsroom/${SLUG}.md"
          git add "content/ai-newsroom/${SLUG}.md"
          git commit -m "Auto: publish ${SLUG}"
          git push

      - name: Log result
        if: always()
        run: |
          echo "========== RUN LOG =========="
          if [ -s output/article.md ]; then
            echo "--- ARTICLE GENERATED ---"
            head -10 output/article.md
          else
            echo "No article generated this run."
          fi
          if [ -f output/error.log ]; then
            echo "--- ERROR LOG ---"
            cat output/error.log
          fi
