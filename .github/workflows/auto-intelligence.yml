name: Auto Intelligence Article

on:
  schedule:
    - cron: '0 10 * * 2,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests python-dateutil python-dotenv Pillow

      - name: Generate Intelligence Article
        timeout-minutes: 25
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY || '' }}
          AI_API_BASE: ${{ secrets.AI_API_BASE || '' }}
          AI_MODEL: ${{ secrets.AI_MODEL || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
        run: python scripts/generate_intelligence.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/opportunities/ content/intelligence/ content/playbooks/ static/images/ data/
          git diff --cached --quiet || git commit -m "auto: new intelligence article (cross-linked)"
          git push
