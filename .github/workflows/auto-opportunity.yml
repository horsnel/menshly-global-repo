name: Auto Opportunity Article

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests python-dateutil python-dotenv Pillow

      - name: Generate Opportunity Article
        timeout-minutes: 15
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python scripts/generate_opportunity.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/opportunities/ static/images/
          git diff --cached --quiet || git commit -m "auto: new opportunity article"
          git push
