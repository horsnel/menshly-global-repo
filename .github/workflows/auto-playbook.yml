name: Auto Playbook

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests python-dateutil python-dotenv Pillow

      - name: Generate Playbook
        timeout-minutes: 50
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY || '' }}
          AI_API_BASE: ${{ secrets.AI_API_BASE || '' }}
          AI_MODEL: ${{ secrets.AI_MODEL || '' }}
          PLAYBOOK_API_KEY: ${{ secrets.PLAYBOOK_API_KEY || '' }}
          PLAYBOOK_API_BASE: ${{ secrets.PLAYBOOK_API_BASE || '' }}
          PLAYBOOK_MODEL: ${{ secrets.PLAYBOOK_MODEL || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
        run: python scripts/generate_playbook.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/opportunities/ content/intelligence/ content/playbooks/ static/images/ data/
          git add -f data/trending_queue.json data/last_generated.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: new playbook (cross-linked to opportunity + intelligence)"
          git push
