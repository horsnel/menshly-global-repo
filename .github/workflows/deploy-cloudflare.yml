# ============================================================
# Menshly Global — CloudFlare Pages Auto-Deploy via Wrangler CLI
# Builds Hugo site in GitHub Actions → Deploys directly to
# CloudFlare Pages using Wrangler. No reliance on CloudFlare's
# auto-detect GitHub integration.
#
# SECRETS REQUIRED (GitHub → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN  — CF API token with Pages edit perms
#   CLOUDFLARE_ACCOUNT_ID — Your CF account ID
# ============================================================

name: Deploy to CloudFlare Pages

on:
  # Auto-trigger after content/template/config changes land in main
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'static/**'
      - 'hugo.toml'
      - 'build.sh'
      - 'functions/**'
      - 'data/**'

  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      commit_message:
        description: 'Custom deploy message'
        required: false
        default: ''

permissions:
  contents: read

env:
  HUGO_VERSION: '0.139.0'
  NODE_VERSION: '20'
  CLOUDFLARE_PROJECT: menshly-global

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deploy environment
        id: config
        run: |
          ENV="${{ inputs.environment || 'preview' }}"
          MSG="${{ inputs.commit_message || github.event.head_commit.message || 'Deploy via CLI' }}"
          MSG=$(echo "$MSG" | head -1 | cut -c1-280)
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "message=$MSG" >> $GITHUB_OUTPUT
          echo "Deploy target: $ENV"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Clean content and build Hugo
        run: |
          if [ -f build.sh ]; then bash build.sh; else hugo --minify; fi
          echo "--- Build Summary ---"
          echo "Pages: $(find public -name '*.html' | wc -l)"
          echo "Assets: $(find public -type f | wc -l)"
          echo "Size: $(du -sh public/ | cut -f1)"

      - name: Verify build
        run: |
          [ -d "public" ] && [ -f "public/index.html" ] || { echo "Build failed!"; exit 1; }

      - name: Deploy to CloudFlare (Preview)
        if: steps.config.outputs.environment == 'preview'
        run: |
          wrangler pages deploy public/ \
            --project-name=${{ env.CLOUDFLARE_PROJECT }} \
            --branch=main \
            --commit-message="${{ steps.config.outputs.message }}" \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to CloudFlare (Production)
        if: steps.config.outputs.environment == 'production'
        run: |
          wrangler pages deploy public/ \
            --project-name=${{ env.CLOUDFLARE_PROJECT }} \
            --branch=main \
            --production \
            --commit-message="${{ steps.config.outputs.message }}" \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy summary
        if: always()
        run: |
          echo "========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "========================================="
          echo "  Project:     ${{ env.CLOUDFLARE_PROJECT }}"
          echo "  Environment: ${{ steps.config.outputs.environment }}"
          echo "  Commit:      ${{ github.sha }}"
          echo "  Trigger:     ${{ github.event_name }}"
          echo "  Live URL:    https://menshly-global.pages.dev/"
          echo "========================================="
