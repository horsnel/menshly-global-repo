# ============================================================
# Menshly Global — Auto Generate Playbooks
# Posts marketplace-ready ebooks, templates & materials
# Target: content/playbooks/
# ============================================================

name: Generate Playbook

on:
  schedule:
    # Runs every Monday and Thursday at 9:00 AM UTC (10 AM WAT)
    - cron: '0 9 * * 1,4'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific playbook topic (leave empty for auto-pick)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-playbook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Playbook
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          MANUAL_TOPIC: ${{ inputs.topic }}
        run: python scripts/generate-playbooks.py

      - name: Check if playbook was created
        id: check
        run: |
          if [ -s output/article.md ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "Playbook generated successfully"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "No playbook was generated"
          fi

      - name: Commit and push playbook
        if: steps.check.outputs.created == 'true'
        run: |
          SECTION=$(cat output/target_section.txt)
          SLUG=$(cat output/target_slug.txt)
          git config user.name "Menshlyglobal Bot"
          git config user.email "bot@menshly-global.pages.dev"
          cp output/article.md "content/${SECTION}/${SLUG}.md"
          git add "content/${SECTION}/${SLUG}.md"
          git commit -m "Auto: Playbook ${SLUG} [skip ci]"
          git push
