<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach Out | MenshlyGlobal Newsroom</title>
    <style>
        :root { --accent: #c00; --bg: #0b0e14; --card: #1a1f29; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { font-size: 2.5rem; letter-spacing: -1px; margin: 0; }
        .header p { color: #888; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-top: 10px; }
        
        .container { flex: 1; max-width: 600px; margin: 60px auto; padding: 0 20px; width: 100%; box-sizing: border-box; }
        .form-card { background: var(--card); padding: 40px; border-radius: 8px; border-bottom: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: #ccc; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #333; background: #0b0e14; color: white; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #e60000; transform: translateY(-2px); }
        
        .footer-link { text-align: center; margin-top: 30px; }
        .footer-link a { color: #888; text-decoration: none; font-size: 0.9rem; }
        .footer-link a:hover { color: var(--accent); }

        /* Honeypot Spam Protection */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>REACH OUT</h1>
        <p>MenshlyGlobal Strategic Intelligence Hotline</p>
    </div>

    <div class="container">
        <div class="form-card">
            <form action="https://formspree.io/f/xreawkow" method="POST">
                
                <label>Full Name / Organization</label>
                <input type="text" name="name" placeholder="e.g. John Doe / Reuters Agency" required>

                <label>Official Email Address</label>
                <input type="email" name="_replyto" placeholder="name@company.com" required>

                <label>Inquiry Category</label>
                <select name="category">
                    <option value="News Tip">Breaking News Tip / Whistleblower</option>
                    <option value="Partnership">Strategic Partnership</option>
                    <option value="Advertising">Advertising & Sponsorship</option>
                    <option value="Correction">Editorial Correction</option>
                </select>

                <label>Your Message</label>
                <textarea name="message" rows="6" placeholder="Provide detailed frontier intelligence or inquiry..." required></textarea>

                <input type="text" name="_gotcha" class="hidden">

                <button type="submit">Transmit to Newsroom</button>
            </form>
        </div>

        <div class="footer-link">
            <a href="index.html">← Back to Global Newsroom</a>
        </div>
    </div>

    <footer style="padding: 40px; text-align: center; font-size: 0.8rem; color: #444;">
        &copy; 2026 MenshlyGlobal Intelligence. All transmissions are encrypted.
    </footer>

</body>
</html>
