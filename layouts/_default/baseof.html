<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="ltr">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "breaking-ticker.html" . }}
  {{ partial "header.html" . }}
  {{ partial "nav-bar.html" . }}
  {{ partial "search-modal.html" . }}
  {{ partial "breaking-alert.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
  {{ partial "cookie-consent.html" . }}
  <button class="back-to-top" id="backToTop" title="Back to top">&#8593;</button>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/search.js" defer></script>
  <script src="/assets/js/main.js" defer></script>
  <script src="/assets/js/weather.js" defer></script>
  <script src="/assets/js/premium-news.js" defer></script>
  <script src="/assets/js/ai-analysis.js" defer></script>
  <script src="/assets/js/pro-analysis.js" defer></script>
  <script src="/assets/js/writing-assistant.js" defer></script>
  <script>
    /* Premium newsletter form handler */
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('newsletterForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          var btn = document.getElementById('newsletterBtn');
          var input = form.querySelector('input');
          if (btn && input) {
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
            btn.disabled = true;
            btn.style.background = '#27ae60';
            input.disabled = true;
            input.value = 'You\'re subscribed!';
            input.style.color = '#27ae60';
          }
        });
      }
    });
  </script>
</body>
</html>
