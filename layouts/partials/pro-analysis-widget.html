<div class="sidebar-widget pro-analysis-widget" id="proAnalysisWidget">
  <div class="pro-header">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Pro Analysis
    </h3>
    <span class="pro-badge">PRO</span>
  </div>

  <!-- Market Regime -->
  <div class="pro-regime" id="proRegime">
    <div class="pro-regime-label">Market Regime</div>
    <div class="pro-regime-value" id="proRegimeValue">
      <span class="pro-regime-dot"></span>
      <span class="pro-regime-text">Calculating...</span>
    </div>
  </div>

  <!-- Signal Strength Meter -->
  <div class="pro-strength">
    <div class="pro-strength-label">
      <span>Signal Strength</span>
      <span class="pro-strength-value" id="proStrengthValue">--%</span>
    </div>
    <div class="pro-strength-bar">
      <div class="pro-strength-fill" id="proStrengthFill" style="width:0%"></div>
    </div>
    <div class="pro-strength-labels">
      <span>Weak</span><span>Moderate</span><span>Strong</span><span>Very Strong</span>
    </div>
  </div>

  <!-- Source Sentiment Breakdown -->
  <div class="pro-sources">
    <div class="pro-sources-title">Source Sentiment</div>
    <div id="proSourceBreakdown">
      <div class="pro-loading-sm">Analyzing sources...</div>
    </div>
  </div>

  <!-- Trend Detection -->
  <div class="pro-trends">
    <div class="pro-trends-title">Trend Changes</div>
    <div id="proTrendChanges">
      <div class="pro-loading-sm">Detecting trends...</div>
    </div>
  </div>

  <!-- Market Briefing -->
  <div class="pro-briefing">
    <div class="pro-briefing-title">Market Briefing</div>
    <div class="pro-briefing-body" id="proBriefingBody">
      <p>Scanning headlines for intelligence briefing...</p>
    </div>
  </div>

  <div class="ai-footer">
    <span class="ai-timestamp" id="proTimestamp">--</span>
    <button class="ai-refresh-btn" id="proRefreshBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh</button>
  </div>
</div>
