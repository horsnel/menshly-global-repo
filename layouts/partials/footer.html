<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">Menshly<span>Global</span></div>

    <div class="footer-newsletter">
      <p class="footer-nl-text">Get our Morning Intelligence Brief delivered daily</p>
      <form class="footer-nl-form" id="footerNlForm" action="https://formspree.io/f/xreawkow" method="POST">
        <input type="hidden" name="_subject" value="New Newsletter Subscriber — Menshly Global (Footer)">
        <input type="hidden" name="form_name" value="newsletter-footer">
        <div class="footer-nl-input-wrap">
          <input type="email" name="email" placeholder="Enter your email" required aria-label="Email address" id="footerNlEmail">
          <button type="submit" id="footerNlSubmit">Subscribe</button>
        </div>
        <p class="footer-nl-status" id="footerNlStatus"></p>
      </form>
    </div>

    <div class="footer-links">
      <a href="/categories">Categories</a>
      <a href="/posts">All Posts</a>
      <a href="/tags">Tags</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Use</a>
      <a href="https://x.com/MenshlyGlobal" target="_blank" rel="me">X (Twitter)</a>
      <a href="{{ "index.xml" | absURL }}" title="RSS Feed"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg></a>
    </div>
    <div class="footer-copy">{{ .Site.Params.footer }}</div>
  </div>
</footer>
<script>
(function(){
  var form=document.getElementById('footerNlForm');
  var email=document.getElementById('footerNlEmail');
  var submit=document.getElementById('footerNlSubmit');
  var status=document.getElementById('footerNlStatus');
  if(!form)return;
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var v=(email.value||'').trim();
    if(!v||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
      if(status){status.textContent='Please enter a valid email address.';status.style.color='#e74c3c';}
      email.focus();return;
    }
    if(status){status.style.color='#888';status.textContent='Subscribing...';}
    submit.disabled=true;
    var fd=new FormData(form);
    fetch(form.action,{method:'POST',body:fd,headers:{'Accept':'application/json'}})
    .then(function(r){
      if(r.ok){
        if(status){status.textContent="You're subscribed! Check your inbox.";status.style.color='#27ae60';}
        email.value='';submit.disabled=false;
        submit.textContent='Subscribed!';
        submit.style.background='#27ae60';
        setTimeout(function(){submit.textContent='Subscribe';submit.style.background='';},3000);
      }else{return r.json().then(function(d){throw new Error(d.error||'Error')});}
    })
    .catch(function(err){
      if(status){status.textContent=err.message||'Please try again.';status.style.color='#e74c3c';}
      submit.disabled=false;
    });
  });
})();
</script>
