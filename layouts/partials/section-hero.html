{{ if .image }}
<div class="section-page-hero section-page-hero--has-image" style="background-image:url('{{ .image }}');">
  <span class="section-label">{{ .label }}</span>
  <h1 class="section-title">{{ .title }}</h1>
  <p>{{ .desc }}</p>
</div>
{{ else }}
<div class="section-page-hero">
  <span class="section-label">{{ .label }}</span>
  <h1 class="section-title">{{ .title }}</h1>
  <p>{{ .desc }}</p>
</div>
{{ end }}
