<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ if .Params.excerpt }}{{ .Params.excerpt }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="theme-color" content="#1a1a1a">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Params.excerpt }}{{ .Params.excerpt }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  {{ if .Params.heroImage }}
  <meta property="og:image" content="{{ .Params.heroImage | absURL }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  {{ else if .Params.image }}
  <meta property="og:image" content="{{ .Params.image | absURL }}">
  {{ end }}
  {{ if not .IsHome }}
  <meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z" }}">
  <meta property="article:section" content="{{ .Section | title }}">
  {{ end }}

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ if .Params.excerpt }}{{ .Params.excerpt }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ if .Params.heroImage }}
  <meta name="twitter:image" content="{{ .Params.heroImage | absURL }}">
  {{ else if .Params.image }}
  <meta name="twitter:image" content="{{ .Params.image | absURL }}">
  {{ end }}

  <!-- Fonts & CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  {{ $css := resources.Get "css/style.css" }}
  {{ $cssMin := $css | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $cssMin.RelPermalink }}">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="1024x1024" href="/images/favicon.png">
</head>
