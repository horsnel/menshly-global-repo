<div class="breaking-alert" id="breaking-alert" style="display:none;">
  <div class="breaking-alert-inner">
    <span class="breaking-alert-badge">BREAKING</span>
    <span class="breaking-alert-text">{{ with .Site.Params.breakingHeadline }}{{ . }}{{ end }}</span>
    <button class="breaking-alert-close" id="breaking-alert-close" aria-label="Dismiss"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
</div>
<script>
(function(){
  // Show static breaking news if set via config
  var a=document.getElementById("breaking-alert"),t=a?a.querySelector(".breaking-alert-text"):null;
  if(a&&t&&t.textContent.trim()){a.style.display="";if(localStorage.getItem("breaking_dismissed"))a.style.display="none"}
  var c=document.getElementById("breaking-alert-close");
  if(c&&a){c.addEventListener("click",function(e){e.stopPropagation();a.style.display="none";localStorage.setItem("breaking_dismissed","1")})}
})();
</script>
