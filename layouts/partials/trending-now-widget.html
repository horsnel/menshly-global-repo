<div class="sidebar-widget trending-now">
  <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg> Trending Now</h3>
  {{ $posts := where .Site.RegularPages "Section" "posts" }}
  {{ range first 5 $posts }}
  <a class="sidebar-article" href="{{ .Permalink }}">
    <h4>{{ .Title }}</h4>
    <span class="card-meta">{{ .Date.Format "Jan 2, 2006" }}</span>
  </a>
  {{ end }}
</div>
