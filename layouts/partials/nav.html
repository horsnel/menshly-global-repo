<nav class="nav-bar" id="nav">
  <!-- Desktop Nav -->
  <div class="nav-desktop">
    <div class="nav-brand">
      <a href="/">{{ .Site.Title }}</a>
    </div>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="{{ if $.Page.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="nav-actions">
      <a href="#newsletter" class="btn-brutal btn-yellow" style="padding:8px 16px;font-size:11px;">SUBSCRIBE</a>
    </div>
  </div>

  <!-- Mobile Nav -->
  <div class="nav-mobile-trigger">
    <span><a href="/" style="color:inherit;text-decoration:none;">{{ .Site.Title }}</a></span>
    <button onclick="document.getElementById('mobileMenu').classList.toggle('open')" aria-label="Menu">☰</button>
  </div>
  <div class="nav-mobile-menu" id="mobileMenu">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <a href="#newsletter" class="btn-brutal btn-yellow" style="margin:12px 20px;text-align:center;font-size:13px;">SUBSCRIBE</a>
  </div>
</nav>

<script>
  // Sticky nav scroll behavior
  window.addEventListener('scroll', function() {
    const nav = document.getElementById('nav');
    if (window.scrollY > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  });
</script>
