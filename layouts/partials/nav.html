<nav class="nav-bar" id="nav">
  <!-- Universal nav bar — logo left, hamburger right (Tesla style, all screen sizes) -->
  <div class="nav-mobile-trigger">
    <a href="/" class="nav-mobile-brand"><img src="/images/logo.png" alt="" class="nav-mobile-logo">{{ .Site.Title }}</a>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
</nav>

<!-- Full-screen overlay drawer (Tesla style, all screen sizes) -->
<div class="mobile-overlay" id="mobileOverlay">
  <div class="mobile-overlay-inner">
    <div class="mobile-overlay-header">
      <a href="/" class="nav-mobile-brand" onclick="closeMobileMenu()"><img src="/images/logo.png" alt="" class="nav-mobile-logo">{{ .Site.Title }}</a>
      <button class="hamburger is-active" onclick="closeMobileMenu()" aria-label="Close">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
    <div class="mobile-overlay-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" onclick="closeMobileMenu()">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="mobile-overlay-footer">
      <button onclick="openPopup();closeMobileMenu()" class="nav-subscribe-btn">SUBSCRIBE</button>
    </div>
  </div>
</div>

<script>
  // No scroll-based nav transitions — always-black bar (Tesla style)

  // Menu toggle
  function toggleMobileMenu() {
    const overlay = document.getElementById('mobileOverlay');
    const btn = document.getElementById('hamburgerBtn');
    overlay.classList.add('open');
    btn.classList.add('is-active');
    document.body.style.overflow = 'hidden';
  }
  function closeMobileMenu() {
    const overlay = document.getElementById('mobileOverlay');
    const btn = document.getElementById('hamburgerBtn');
    overlay.classList.remove('open');
    btn.classList.remove('is-active');
    document.body.style.overflow = '';
  }
</script>
