<nav class="nav-bar" id="nav">
  <!-- Desktop Nav -->
  <div class="nav-desktop">
    <div class="nav-brand">
      <a href="/"><img src="/images/logo.png" alt="Menshly Global" class="nav-logo" style="height:28px;width:auto;margin-right:8px;vertical-align:middle;"><span style="vertical-align:middle;">{{ .Site.Title }}</span></a>
    </div>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="{{ if $.Page.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="nav-actions">
      <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <svg class="dm-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="dm-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
      <a href="#newsletter" class="btn-brutal btn-yellow" style="padding:8px 16px;font-size:11px;">SUBSCRIBE</a>
    </div>
  </div>

  <!-- Mobile Nav -->
  <div class="nav-mobile-trigger">
    <span><a href="/" style="color:inherit;text-decoration:none;"><img src="/images/logo.png" alt="" style="height:20px;width:auto;vertical-align:middle;margin-right:6px;">{{ .Site.Title }}</a></span>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="dark-mode-toggle" id="darkModeToggleMobile" aria-label="Toggle dark mode" style="border:2px solid var(--black);padding:4px 8px;background:none;cursor:pointer;">
        <svg class="dm-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
        <svg class="dm-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
      <button onclick="document.getElementById('mobileMenu').classList.toggle('open')" aria-label="Menu" style="border:3px solid var(--black);padding:4px 10px;font-family:var(--font-heading);font-weight:700;font-size:18px;cursor:pointer;background:none;">☰</button>
    </div>
  </div>
  <div class="nav-mobile-menu" id="mobileMenu">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <a href="#newsletter" class="btn-brutal btn-yellow" style="margin:12px 20px;text-align:center;font-size:13px;">SUBSCRIBE</a>
  </div>
</nav>

<script>
  // Sticky nav scroll behavior + backdrop blur
  window.addEventListener('scroll', function() {
    const nav = document.getElementById('nav');
    if (window.scrollY > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  });

  // Mobile dark mode toggle sync
  (function(){
    var mobileToggle = document.getElementById('darkModeToggleMobile');
    if (!mobileToggle) return;
    mobileToggle.addEventListener('click', function() {
      var mainToggle = document.getElementById('darkModeToggle');
      if (mainToggle) mainToggle.click();
    });
  })();
</script>
