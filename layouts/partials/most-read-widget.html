<div class="sidebar-widget most-read-widget">
  <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg> Most Read</h3>
  {{ $posts := where .Site.RegularPages "Section" "posts" }}
  {{ $counter := 1 }}
  {{ range first 8 $posts }}
  <a class="most-read-item" href="{{ .Permalink }}">
    <span class="most-read-rank">{{ $counter }}</span>
    <div class="most-read-body">
      <h4>{{ .Title }}</h4>
      <span class="card-meta">{{ .Date.Format "Jan 2, 2006" }}</span>
    </div>
  </a>
  {{ $counter = add $counter 1 }}
  {{ end }}
</div>
