<script>
// ===== AUDIO PLAYER — Microsoft TTS (Browser speechSynthesis) =====
// Uses the Web Speech API which provides Microsoft voices on Edge/Windows
// and high-quality system voices on other browsers.
// Handles Chrome's 15-second bug by chunking text into smaller pieces.
(function() {
  var synth = window.speechSynthesis;
  var isListening = false;
  var isPaused = false;
  var currentSpeed = 1;
  var progressInterval = null;
  var estimatedDuration = 0;
  var startTime = 0;
  var textChunks = [];
  var currentChunkIndex = 0;
  var totalChunks = 0;
  var selectedVoiceIndex = -1;
  var availableVoices = [];
  var voicesLoaded = false;
  var CHUNK_SIZE = 180;

  function cleanTextForTTS(raw) {
    if (!raw || typeof raw !== 'string') return '';
    var text = raw;
    text = text.replace(/<[^>]*>/g, ' ');
    text = text.replace(/!\[[^\]]*\]\([^)]*\)/g, '');
    text = text.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');
    text = text.replace(/^#{1,6}\s+/gm, '');
    text = text.replace(/(\*{1,3}|_{1,3})(.*?)\1/g, '$2');
    text = text.replace(/^[-*_]{3,}\s*$/gm, '');
    text = text.replace(/```[\s\S]*?```/g, '');
    text = text.replace(/`([^`]+)`/g, '$1');
    text = text.replace(/^>\s+/gm, '');
    text = text.replace(/[\u2018\u2019]/g, "'");
    text = text.replace(/[\u201C\u201D]/g, '"');
    text = text.replace(/\u2011/g, '-');
    text = text.replace(/\u2013/g, '-');
    text = text.replace(/\u2014/g, '--');
    text = text.replace(/\s+/g, ' ').trim();
    return text;
  }

  function splitIntoChunks(text, maxLen) {
    var chunks = [];
    var sentences = text.match(/[^.!?]+[.!?]+\s*/g) || [text];
    var current = '';
    for (var i = 0; i < sentences.length; i++) {
      if ((current + sentences[i]).length > maxLen && current.length > 0) {
        chunks.push(current.trim());
        current = sentences[i];
      } else {
        current += sentences[i];
      }
    }
    if (current.trim()) chunks.push(current.trim());
    var finalChunks = [];
    for (var j = 0; j < chunks.length; j++) {
      if (chunks[j].length <= maxLen) {
        finalChunks.push(chunks[j]);
      } else {
        var parts = chunks[j].split(/,\s*/);
        var sub = '';
        for (var k = 0; k < parts.length; k++) {
          if ((sub + (sub ? ', ' : '') + parts[k]).length > maxLen && sub.length > 0) {
            finalChunks.push(sub.trim());
            sub = parts[k];
          } else {
            sub += (sub ? ', ' : '') + parts[k];
          }
        }
        if (sub.trim()) finalChunks.push(sub.trim());
      }
    }
    return finalChunks.length > 0 ? finalChunks : [text.substring(0, maxLen)];
  }

  function loadVoices() {
    if (!synth) return [];
    var voices = synth.getVoices();
    if (!voices || voices.length === 0) return [];
    var msVoices = [], enLocalVoices = [], enNetworkVoices = [], otherVoices = [];
    for (var i = 0; i < voices.length; i++) {
      var v = voices[i];
      var name = v.name.toLowerCase();
      if (v.lang && v.lang.startsWith('en')) {
        if (name.indexOf('microsoft') !== -1 && (name.indexOf('natural') !== -1 || name.indexOf('online') !== -1)) {
          msVoices.push(v);
        } else if (v.localService) {
          enLocalVoices.push(v);
        } else {
          enNetworkVoices.push(v);
        }
      } else {
        otherVoices.push(v);
      }
    }
    availableVoices = msVoices.concat(enNetworkVoices).concat(enLocalVoices).concat(otherVoices);
    populateVoiceSelector();
    voicesLoaded = true;
    return availableVoices;
  }

  function populateVoiceSelector() {
    var sel = document.getElementById('voiceSelector');
    if (!sel) return;
    sel.innerHTML = '<option value="-1">Auto Voice</option>';
    for (var i = 0; i < availableVoices.length; i++) {
      var v = availableVoices[i];
      var opt = document.createElement('option');
      opt.value = i;
      var displayName = v.name;
      if (displayName.indexOf('Microsoft') !== -1) {
        displayName = displayName.replace(' - English (United States)', '').replace(' - English (United Kingdom)', '');
      }
      opt.textContent = displayName;
      sel.appendChild(opt);
    }
  }

  function getBestVoice() {
    if (selectedVoiceIndex >= 0 && selectedVoiceIndex < availableVoices.length) return availableVoices[selectedVoiceIndex];
    for (var i = 0; i < availableVoices.length; i++) {
      var n = availableVoices[i].name.toLowerCase();
      if (n.indexOf('microsoft') !== -1 && (n.indexOf('natural') !== -1 || n.indexOf('online') !== -1)) return availableVoices[i];
    }
    for (var j = 0; j < availableVoices.length; j++) {
      if (availableVoices[j].lang && availableVoices[j].lang.startsWith('en') && !availableVoices[j].localService) return availableVoices[j];
    }
    for (var k = 0; k < availableVoices.length; k++) {
      if (availableVoices[k].lang && availableVoices[k].lang.startsWith('en')) return availableVoices[k];
    }
    if (availableVoices.length > 0) return availableVoices[0];
    return null;
  }

  function resetPlayerUI() {
    isListening = false; isPaused = false;
    textChunks = []; currentChunkIndex = 0; totalChunks = 0;
    var btn = document.getElementById('listenBtn');
    var label = document.getElementById('listenLabel');
    var speedWrap = document.getElementById('audioSpeedWrap');
    var progressWrap = document.getElementById('audioProgressWrap');
    var voiceWrap = document.getElementById('voiceSelectorWrap');
    if (label) label.textContent = 'LISTEN';
    if (btn) btn.classList.remove('listening');
    if (speedWrap) speedWrap.style.display = 'none';
    if (progressWrap) progressWrap.style.display = 'none';
    if (voiceWrap) voiceWrap.style.display = 'none';
    var fill = document.getElementById('audioProgressFill');
    if (fill) fill.style.width = '0%';
    var timeDisplay = document.getElementById('audioTimeDisplay');
    if (timeDisplay) timeDisplay.textContent = '0:00';
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }

  function updateProgress() {
    if (!isListening || isPaused) return;
    var elapsed = (Date.now() - startTime) / 1000;
    var pct = Math.min((elapsed / estimatedDuration) * 100, 99);
    var fill = document.getElementById('audioProgressFill');
    if (fill) fill.style.width = pct + '%';
    var remaining = Math.max(0, estimatedDuration - elapsed);
    var mins = Math.floor(remaining / 60);
    var secs = Math.floor(remaining % 60);
    var display = document.getElementById('audioTimeDisplay');
    if (display) display.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
  }

  function speakChunk() {
    if (!isListening || currentChunkIndex >= textChunks.length) { resetPlayerUI(); return; }
    var chunk = textChunks[currentChunkIndex];
    var utterance = new SpeechSynthesisUtterance(chunk);
    utterance.rate = currentSpeed; utterance.pitch = 1;
    var voice = getBestVoice();
    if (voice) utterance.voice = voice;
    utterance.onend = function() {
      currentChunkIndex++;
      if (isListening) setTimeout(function() { speakChunk(); }, 80);
    };
    utterance.onerror = function(e) {
      console.error('Speech error on chunk', currentChunkIndex, ':', e.error);
      if (e.error !== 'canceled' && e.error !== 'interrupted') {
        currentChunkIndex++;
        if (isListening) setTimeout(function() { speakChunk(); }, 100);
      }
    };
    synth.speak(utterance);
  }

  window.toggleListen = function() {
    var btn = document.getElementById('listenBtn');
    var label = document.getElementById('listenLabel');
    var speedWrap = document.getElementById('audioSpeedWrap');
    var progressWrap = document.getElementById('audioProgressWrap');
    var voiceWrap = document.getElementById('voiceSelectorWrap');
    if (isListening && !isPaused) {
      if (synth) synth.pause();
      isPaused = true; label.textContent = 'PLAY'; btn.classList.remove('listening');
      return;
    }
    if (isListening && isPaused) {
      if (synth) synth.resume();
      isPaused = false; label.textContent = 'STOP'; btn.classList.add('listening');
      return;
    }
    var content = document.querySelector('.article-content');
    if (!content) { console.warn('No .article-content element found'); return; }
    var rawText = content.innerText;
    if (!rawText.trim()) { console.warn('Article content is empty'); return; }
    var cleanText = cleanTextForTTS(rawText);
    if (!cleanText) { console.warn('Text empty after cleaning'); return; }
    if (!synth) { alert('Your browser does not support text-to-speech. Please try Chrome, Edge, or Safari.'); return; }
    if (!voicesLoaded) loadVoices();
    synth.cancel();
    textChunks = splitIntoChunks(cleanText, CHUNK_SIZE);
    currentChunkIndex = 0; totalChunks = textChunks.length;
    var wordCount = cleanText.split(/\s+/).length;
    var adjustedWPM = 150 * currentSpeed;
    estimatedDuration = (wordCount / adjustedWPM) * 60;
    isListening = true; isPaused = false; startTime = Date.now();
    label.textContent = 'STOP'; btn.classList.add('listening');
    speedWrap.style.display = 'flex'; progressWrap.style.display = 'flex'; voiceWrap.style.display = 'block';
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(updateProgress, 500);
    speakChunk();
    var watchdogInterval = setInterval(function() {
      if (!isListening) { clearInterval(watchdogInterval); return; }
      if (!synth.speaking && isListening && !isPaused) { synth.resume(); }
    }, 5000);
  };

  window.seekAudio = function(e) {
    if (!isListening) return;
    var bar = document.getElementById('audioProgressBar');
    var rect = bar.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    var targetChunk = Math.floor(pct * totalChunks);
    if (targetChunk >= totalChunks) targetChunk = totalChunks - 1;
    if (targetChunk < 0) targetChunk = 0;
    synth.cancel(); currentChunkIndex = targetChunk;
    startTime = Date.now() - (pct * estimatedDuration * 1000);
    var fill = document.getElementById('audioProgressFill');
    if (fill) fill.style.width = (pct * 100) + '%';
    setTimeout(function() { if (isListening) speakChunk(); }, 100);
  };

  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('speed-btn')) {
      var speed = parseFloat(e.target.dataset.speed);
      currentSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      if (isListening) {
        synth.cancel();
        var wordCount = 0;
        for (var i = 0; i < currentChunkIndex; i++) wordCount += textChunks[i].split(/\s+/).length;
        var totalWords = 0;
        for (var j = 0; j < textChunks.length; j++) totalWords += textChunks[j].split(/\s+/).length;
        estimatedDuration = (totalWords / (150 * speed)) * 60;
        startTime = Date.now() - ((wordCount / totalWords) * estimatedDuration * 1000);
        setTimeout(function() { if (isListening) speakChunk(); }, 100);
      }
    }
  });

  document.addEventListener('change', function(e) {
    if (e.target.id === 'voiceSelector') {
      selectedVoiceIndex = parseInt(e.target.value, 10);
      if (isListening) {
        synth.cancel();
        setTimeout(function() { if (isListening) speakChunk(); }, 100);
      }
    }
  });

  if (synth) {
    loadVoices();
    synth.onvoiceschanged = function() { loadVoices(); };
  }

  // ===== LIKE BUTTON (Live KV-backed) =====
  var LIKES_KEY = 'menshly_liked_articles';
  var PAGE_SLUG = window.location.pathname.replace(/^\/|\/$/g, '');
  var liveLikeCount = 0;
  var isLikedByUser = false;

  function getUserLikedArticles() {
    try { return JSON.parse(localStorage.getItem(LIKES_KEY) || '[]'); }
    catch { return []; }
  }

  function setUserLiked(liked) {
    var arr = getUserLikedArticles();
    if (liked) { if (arr.indexOf(PAGE_SLUG) === -1) arr.push(PAGE_SLUG); }
    else { arr = arr.filter(function(s) { return s !== PAGE_SLUG; }); }
    localStorage.setItem(LIKES_KEY, JSON.stringify(arr));
  }

  function isUserLiked() { return getUserLikedArticles().indexOf(PAGE_SLUG) !== -1; }

  async function fetchLiveCount() {
    try {
      var res = await fetch('/api/likes?slug=' + encodeURIComponent(PAGE_SLUG));
      if (res.ok) { var data = await res.json(); liveLikeCount = data.likes || 0; updateLikeUI(); }
    } catch (e) {
      var hash = 0;
      for (var i = 0; i < PAGE_SLUG.length; i++) { hash = ((hash << 5) - hash) + PAGE_SLUG.charCodeAt(i); hash |= 0; }
      liveLikeCount = Math.abs(hash) % 47 + 8; updateLikeUI();
    }
  }

  function updateLikeUI() {
    var btn = document.getElementById('likeBtn');
    var icon = document.getElementById('likeIcon');
    var countEl = document.getElementById('likeCount');
    if (!btn || !countEl) return;
    isLikedByUser = isUserLiked();
    countEl.textContent = liveLikeCount + (isLikedByUser ? 1 : 0);
    if (isLikedByUser) { btn.classList.add('liked'); icon.setAttribute('fill', 'currentColor'); }
    else { btn.classList.remove('liked'); icon.setAttribute('fill', 'none'); }
  }

  window.toggleLike = async function() {
    var btn = document.getElementById('likeBtn');
    var icon = document.getElementById('likeIcon');
    var countEl = document.getElementById('likeCount');
    if (isLikedByUser) {
      isLikedByUser = false; setUserLiked(false);
      btn.classList.remove('liked'); icon.setAttribute('fill', 'none');
      countEl.textContent = liveLikeCount;
    } else {
      isLikedByUser = true; setUserLiked(true);
      btn.classList.add('liked'); icon.setAttribute('fill', 'currentColor');
      countEl.textContent = liveLikeCount + 1;
      btn.classList.add('like-pop');
      setTimeout(function() { btn.classList.remove('like-pop'); }, 400);
      if (typeof createHeartBurst === 'function') createHeartBurst(btn);
      try {
        var res = await fetch('/api/likes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug: PAGE_SLUG }) });
        if (res.ok) { var data = await res.json(); liveLikeCount = data.likes || 0; countEl.textContent = liveLikeCount; }
      } catch (e) {}
    }
  };

  fetchLiveCount();
})();
</script>
