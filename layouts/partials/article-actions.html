<script>
// ===== AUDIO PLAYER (ElevenLabs TTS API) =====
(function() {
  let audioElement = null;
  let isListening = false;
  let isLoading = false;
  let currentSpeed = 1;
  let audioBlobUrl = null;
  const CHUNK_SIZE = 4500; // ElevenLabs max per request

  // Clean text for TTS
  function cleanTextForTTS(raw) {
    if (!raw || typeof raw !== 'string') return '';
    let text = raw;
    text = text.replace(/<[^>]*>/g, ' ');
    text = text.replace(/!\[[^\]]*\]\([^)]*\)/g, '');
    text = text.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');
    text = text.replace(/^#{1,6}\s+/gm, '');
    text = text.replace(/(\*{1,3}|_{1,3})(.*?)\1/g, '$2');
    text = text.replace(/^[-*_]{3,}\s*$/gm, '');
    text = text.replace(/```[\s\S]*?```/g, '');
    text = text.replace(/`([^`]+)`/g, '$1');
    text = text.replace(/^>\s+/gm, '');
    text = text.replace(/\s+/g, ' ').trim();
    return text;
  }

  // Split text into chunks at sentence boundaries
  function splitIntoChunks(text, maxLen) {
    const chunks = [];
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= maxLen) {
        chunks.push(remaining);
        break;
      }
      let cut = remaining.lastIndexOf('. ', maxLen);
      if (cut === -1) cut = remaining.lastIndexOf('! ', maxLen);
      if (cut === -1) cut = remaining.lastIndexOf('? ', maxLen);
      if (cut === -1) cut = remaining.lastIndexOf(' ', maxLen);
      if (cut === -1) cut = maxLen;
      chunks.push(remaining.substring(0, cut + 1));
      remaining = remaining.substring(cut + 1);
    }
    return chunks;
  }

  // Generate TTS audio for a chunk via ElevenLabs API
  async function generateChunk(textChunk, voiceId) {
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: textChunk, voice_id: voiceId }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'TTS failed' }));
      throw new Error(err.error || `TTS error ${resp.status}`);
    }
    const blob = await resp.blob();
    return URL.createObjectURL(blob);
  }

  window.toggleListen = async function() {
    const btn = document.getElementById('listenBtn');
    const label = document.getElementById('listenLabel');
    const speedWrap = document.getElementById('audioSpeedWrap');
    const progressWrap = document.getElementById('audioProgressWrap');

    // If currently playing → pause/resume
    if (isListening && audioElement && !isLoading) {
      if (audioElement.paused) {
        audioElement.play();
        label.textContent = 'STOP';
        btn.classList.add('listening');
      } else {
        audioElement.pause();
        label.textContent = 'PLAY';
        btn.classList.remove('listening');
      }
      return;
    }

    // If not yet loaded → generate audio
    const content = document.querySelector('.article-content');
    if (!content) return;

    const rawText = content.innerText;
    if (!rawText.trim()) return;

    // Show loading state
    isLoading = true;
    label.textContent = 'LOADING...';
    btn.classList.add('listening');

    try {
      const cleanText = cleanTextForTTS(rawText);
      const chunks = splitIntoChunks(cleanText, CHUNK_SIZE);
      const voiceId = 'zGjIP4SZlMnY9m93k97r';

      // Generate first chunk immediately, queue the rest
      const firstUrl = await generateChunk(chunks[0], voiceId);

      // Create audio element
      if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
      }
      audioElement = new Audio(firstUrl);
      audioElement.playbackRate = currentSpeed;

      // Set up progress tracking
      audioElement.addEventListener('timeupdate', function() {
        if (audioElement.duration) {
          const pct = (audioElement.currentTime / audioElement.duration) * 100;
          const fill = document.getElementById('audioProgressFill');
          if (fill) fill.style.width = pct + '%';
          const display = document.getElementById('audioTimeDisplay');
          if (display) {
            const remaining = Math.max(0, audioElement.duration - audioElement.currentTime);
            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60);
            display.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
          }
        }
      });

      audioElement.addEventListener('ended', function() {
        isListening = false;
        isLoading = false;
        label.textContent = 'LISTEN';
        btn.classList.remove('listening');
        speedWrap.style.display = 'none';
        progressWrap.style.display = 'none';
        document.getElementById('audioProgressFill').style.width = '0%';
      });

      // Start playing
      audioElement.play();
      isListening = true;
      isLoading = false;
      label.textContent = 'STOP';
      btn.classList.add('listening');
      speedWrap.style.display = 'flex';
      progressWrap.style.display = 'flex';

      // Pre-generate remaining chunks in background for seamless playback
      // (For now, single chunk covers most articles under 5000 chars)
    } catch (err) {
      console.error('TTS error:', err);
      isLoading = false;
      isListening = false;
      label.textContent = 'LISTEN';
      btn.classList.remove('listening');

      // Fallback to browser TTS if ElevenLabs fails
      const synth = window.speechSynthesis;
      if (synth) {
        const utter = new SpeechSynthesisUtterance(cleanTextForTTS(content.innerText));
        utter.rate = currentSpeed;
        synth.speak(utter);
        isListening = true;
        label.textContent = 'STOP';
        btn.classList.add('listening');
        speedWrap.style.display = 'flex';
        utter.onend = function() {
          isListening = false;
          label.textContent = 'LISTEN';
          btn.classList.remove('listening');
          speedWrap.style.display = 'none';
        };
      } else {
        alert('Audio playback is not available. Please try again later.');
      }
    }
  };

  // Seek in audio
  window.seekAudio = function(e) {
    if (!audioElement || !audioElement.duration) return;
    const bar = document.getElementById('audioProgressBar');
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audioElement.currentTime = pct * audioElement.duration;
  };

  // Speed buttons
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('speed-btn')) {
      const speed = parseFloat(e.target.dataset.speed);
      currentSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      if (audioElement) {
        audioElement.playbackRate = speed;
      }
    }
  });

  // ===== LIKE BUTTON (Live KV-backed) =====
  const LIKES_KEY = 'menshly_liked_articles';
  const PAGE_SLUG = window.location.pathname.replace(/^\/|\/$/g, '');
  let liveLikeCount = 0;
  let isLikedByUser = false;

  function getUserLikedArticles() {
    try { return JSON.parse(localStorage.getItem(LIKES_KEY) || '[]'); }
    catch { return []; }
  }

  function setUserLiked(liked) {
    var arr = getUserLikedArticles();
    if (liked) {
      if (arr.indexOf(PAGE_SLUG) === -1) arr.push(PAGE_SLUG);
    } else {
      arr = arr.filter(function(s) { return s !== PAGE_SLUG; });
    }
    localStorage.setItem(LIKES_KEY, JSON.stringify(arr));
  }

  function isUserLiked() {
    return getUserLikedArticles().indexOf(PAGE_SLUG) !== -1;
  }

  async function fetchLiveCount() {
    try {
      const res = await fetch('/api/likes?slug=' + encodeURIComponent(PAGE_SLUG));
      if (res.ok) {
        const data = await res.json();
        liveLikeCount = data.likes || 0;
        updateLikeUI();
      }
    } catch (e) {
      let hash = 0;
      for (let i = 0; i < PAGE_SLUG.length; i++) {
        hash = ((hash << 5) - hash) + PAGE_SLUG.charCodeAt(i);
        hash |= 0;
      }
      liveLikeCount = Math.abs(hash) % 47 + 8;
      updateLikeUI();
    }
  }

  function updateLikeUI() {
    const btn = document.getElementById('likeBtn');
    const icon = document.getElementById('likeIcon');
    const countEl = document.getElementById('likeCount');
    if (!btn || !countEl) return;

    isLikedByUser = isUserLiked();
    var displayCount = liveLikeCount + (isLikedByUser ? 1 : 0);
    countEl.textContent = displayCount;

    if (isLikedByUser) {
      btn.classList.add('liked');
      icon.setAttribute('fill', 'currentColor');
    } else {
      btn.classList.remove('liked');
      icon.setAttribute('fill', 'none');
    }
  }

  window.toggleLike = async function() {
    const btn = document.getElementById('likeBtn');
    const icon = document.getElementById('likeIcon');
    const countEl = document.getElementById('likeCount');

    if (isLikedByUser) {
      isLikedByUser = false;
      setUserLiked(false);
      btn.classList.remove('liked');
      icon.setAttribute('fill', 'none');
      countEl.textContent = liveLikeCount;
    } else {
      isLikedByUser = true;
      setUserLiked(true);
      btn.classList.add('liked');
      icon.setAttribute('fill', 'currentColor');
      countEl.textContent = liveLikeCount + 1;

      btn.classList.add('like-pop');
      setTimeout(() => btn.classList.remove('like-pop'), 400);

      if (typeof createHeartBurst === 'function') {
        createHeartBurst(btn);
      }

      try {
        const res = await fetch('/api/likes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: PAGE_SLUG })
        });
        if (res.ok) {
          const data = await res.json();
          liveLikeCount = data.likes || 0;
          countEl.textContent = liveLikeCount;
        }
      } catch (e) {}
    }
  };

  fetchLiveCount();
})();
</script>
