<script>
// ===== AUDIO PLAYER (Fixed TTS) =====
(function() {
  const synth = window.speechSynthesis;
  let utterance = null;
  let isListening = false;
  let currentSpeed = 1;
  const PAGE_ID = window.location.pathname;

  // Chrome bug workaround: voices not loaded until after page load
  let voices = [];
  function loadVoices() {
    voices = synth.getVoices();
  }
  loadVoices();
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }

  // Pick the best English voice available
  function getBestVoice() {
    const prefs = ['Natural', 'Enhanced', 'Neural', 'Microsoft', 'Google', 'Samantha', 'Daniel'];
    for (const p of prefs) {
      const v = voices.find(v => v.name.includes(p) && v.lang.startsWith('en'));
      if (v) return v;
    }
    const enVoice = voices.find(v => v.lang.startsWith('en-'));
    if (enVoice) return enVoice;
    const anyEn = voices.find(v => v.lang.startsWith('en'));
    return anyEn || null;
  }

  // Chrome keeps killing TTS after ~15s — pause/resume workaround
  let keepaliveInterval = null;
  function startKeepalive() {
    if (keepaliveInterval) return;
    keepaliveInterval = setInterval(() => {
      if (synth.speaking && !synth.paused) {
        synth.pause();
        setTimeout(() => synth.resume(), 50);
      }
    }, 10000);
  }
  function stopKeepalive() {
    if (keepaliveInterval) {
      clearInterval(keepaliveInterval);
      keepaliveInterval = null;
    }
  }

  window.toggleListen = function() {
    const btn = document.getElementById('listenBtn');
    const label = document.getElementById('listenLabel');
    const speedWrap = document.getElementById('audioSpeedWrap');

    if (isListening) {
      synth.cancel();
      stopKeepalive();
      isListening = false;
      label.textContent = 'LISTEN';
      btn.classList.remove('listening');
      speedWrap.style.display = 'none';
      return;
    }

    const content = document.querySelector('.article-content');
    if (!content) return;

    const text = content.innerText;
    if (!text.trim()) return;

    // Split long text into chunks at sentence boundaries (max 2800 chars)
    const chunks = [];
    const MAX = 2800;
    let remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= MAX) {
        chunks.push(remaining);
        break;
      }
      // Find last sentence boundary within MAX
      let cut = remaining.lastIndexOf('. ', MAX);
      if (cut === -1) cut = remaining.lastIndexOf('! ', MAX);
      if (cut === -1) cut = remaining.lastIndexOf('? ', MAX);
      if (cut === -1) cut = remaining.lastIndexOf(' ', MAX);
      if (cut === -1) cut = MAX;
      chunks.push(remaining.substring(0, cut + 1));
      remaining = remaining.substring(cut + 1);
    }

    let chunkIndex = 0;

    function speakChunk() {
      if (chunkIndex >= chunks.length) {
        // All done
        isListening = false;
        label.textContent = 'LISTEN';
        btn.classList.remove('listening');
        speedWrap.style.display = 'none';
        stopKeepalive();
        return;
      }

      utterance = new SpeechSynthesisUtterance(chunks[chunkIndex]);
      utterance.rate = currentSpeed;
      utterance.pitch = 1.0;
      const voice = getBestVoice();
      if (voice) utterance.voice = voice;

      utterance.onend = function() {
        chunkIndex++;
        speakChunk();
      };

      utterance.onerror = function() {
        isListening = false;
        label.textContent = 'LISTEN';
        btn.classList.remove('listening');
        speedWrap.style.display = 'none';
        stopKeepalive();
      };

      synth.speak(utterance);
    }

    speakChunk();
    isListening = true;
    label.textContent = 'STOP';
    btn.classList.add('listening');
    speedWrap.style.display = 'flex';
    startKeepalive();
  };

  // Speed buttons
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('speed-btn')) {
      const speed = parseFloat(e.target.dataset.speed);
      currentSpeed = speed;
      // Update active state
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      // If currently listening, restart with new speed
      if (isListening) {
        synth.cancel();
        const content = document.querySelector('.article-content');
        if (content) {
          const text = content.innerText;
          const utter = new SpeechSynthesisUtterance(text);
          utter.rate = speed;
          const voice = getBestVoice();
          if (voice) utter.voice = voice;
          utter.onend = function() {
            isListening = false;
            document.getElementById('listenLabel').textContent = 'LISTEN';
            document.getElementById('listenBtn').classList.remove('listening');
            document.getElementById('audioSpeedWrap').style.display = 'none';
            stopKeepalive();
          };
          synth.speak(utter);
        }
      }
    }
  });

  // ===== LIKE BUTTON (Live KV-backed) =====
  const LIKES_KEY = 'menshly_liked_articles';
  const PAGE_SLUG = window.location.pathname.replace(/^\/|\/$/g, '');
  let liveLikeCount = 0;
  let isLikedByUser = false;

  // Check if user already liked
  function getUserLikedArticles() {
    try { return JSON.parse(localStorage.getItem(LIKES_KEY) || '[]'); }
    catch { return []; }
  }

  function setUserLiked(liked) {
    var arr = getUserLikedArticles();
    if (liked) {
      if (arr.indexOf(PAGE_SLUG) === -1) arr.push(PAGE_SLUG);
    } else {
      arr = arr.filter(function(s) { return s !== PAGE_SLUG; });
    }
    localStorage.setItem(LIKES_KEY, JSON.stringify(arr));
  }

  function isUserLiked() {
    return getUserLikedArticles().indexOf(PAGE_SLUG) !== -1;
  }

  // Fetch live count from KV
  async function fetchLiveCount() {
    try {
      const res = await fetch('/api/likes?slug=' + encodeURIComponent(PAGE_SLUG));
      if (res.ok) {
        const data = await res.json();
        liveLikeCount = data.likes || 0;
        updateLikeUI();
      }
    } catch (e) {
      // Fallback: generate deterministic base count
      let hash = 0;
      for (let i = 0; i < PAGE_SLUG.length; i++) {
        hash = ((hash << 5) - hash) + PAGE_SLUG.charCodeAt(i);
        hash |= 0;
      }
      liveLikeCount = Math.abs(hash) % 47 + 8;
      updateLikeUI();
    }
  }

  function updateLikeUI() {
    const btn = document.getElementById('likeBtn');
    const icon = document.getElementById('likeIcon');
    const countEl = document.getElementById('likeCount');
    if (!btn || !countEl) return;

    isLikedByUser = isUserLiked();
    var displayCount = liveLikeCount + (isLikedByUser ? 1 : 0);
    countEl.textContent = displayCount;

    if (isLikedByUser) {
      btn.classList.add('liked');
      icon.setAttribute('fill', 'currentColor');
    } else {
      btn.classList.remove('liked');
      icon.setAttribute('fill', 'none');
    }
  }

  window.toggleLike = async function() {
    const btn = document.getElementById('likeBtn');
    const icon = document.getElementById('likeIcon');
    const countEl = document.getElementById('likeCount');

    if (isLikedByUser) {
      // Unlike (local only — we don't decrement KV to prevent abuse)
      isLikedByUser = false;
      setUserLiked(false);
      btn.classList.remove('liked');
      icon.setAttribute('fill', 'none');
      countEl.textContent = liveLikeCount;
    } else {
      // Like — POST to KV
      isLikedByUser = true;
      setUserLiked(true);
      btn.classList.add('liked');
      icon.setAttribute('fill', 'currentColor');
      countEl.textContent = liveLikeCount + 1;

      // Pop animation
      btn.classList.add('like-pop');
      setTimeout(() => btn.classList.remove('like-pop'), 400);

      // Heart burst particles
      if (typeof createHeartBurst === 'function') {
        createHeartBurst(btn);
      }

      // Send to KV
      try {
        const res = await fetch('/api/likes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: PAGE_SLUG })
        });
        if (res.ok) {
          const data = await res.json();
          liveLikeCount = data.likes || 0;
          countEl.textContent = liveLikeCount;
        }
      } catch (e) {
        // Silent fail — like is still recorded locally
      }
    }
  };

  // Init: fetch live count on page load
  fetchLiveCount();
})();
</script>
