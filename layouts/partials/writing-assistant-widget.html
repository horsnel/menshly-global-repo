<div class="sidebar-widget writing-assistant-widget" id="writingAssistantWidget">
  <div class="wa-header">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Writing Assistant
    </h3>
    <span class="wa-badge">AI</span>
  </div>

  <!-- Tab Navigation -->
  <div class="wa-tabs">
    <button class="wa-tab active" data-tab="trending">Trending</button>
    <button class="wa-tab" data-tab="headlines">SEO Ideas</button>
    <button class="wa-tab" data-tab="talking">Talking Pts</button>
  </div>

  <!-- Tab: Trending Topics -->
  <div class="wa-tab-content active" id="waTrendingTab">
    <div class="wa-tab-desc">Hot topics detected from live news feeds</div>
    <div id="waTrendingList">
      <div class="pro-loading-sm">Scanning feeds...</div>
    </div>
  </div>

  <!-- Tab: SEO Headline Suggestions -->
  <div class="wa-tab-content" id="waHeadlinesTab">
    <div class="wa-tab-desc">Click a trending topic to get headline ideas</div>
    <div id="waHeadlineList">
      <p class="wa-empty">Select a trending topic to generate SEO headlines</p>
    </div>
  </div>

  <!-- Tab: Key Talking Points -->
  <div class="wa-tab-content" id="waTalkingTab">
    <div class="wa-tab-desc">Key themes extracted from today's headlines</div>
    <div id="waTalkingList">
      <div class="pro-loading-sm">Extracting themes...</div>
    </div>
  </div>

  <div class="ai-footer">
    <span class="ai-timestamp" id="waTimestamp">--</span>
    <button class="ai-refresh-btn" id="waRefreshBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh</button>
  </div>
</div>
