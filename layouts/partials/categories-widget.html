<div class="sidebar-widget categories-widget-premium">
  <h3 class="categories-widget-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Explore Topics
  </h3>
  <div class="categories-grid">
    {{ range $name, $taxonomy := .Site.Taxonomies.categories }}
    <a class="category-tag-item" href="/categories/{{ $name | urlize }}">
      <span class="category-tag-name">{{ title $name }}</span>
      <span class="category-tag-count">{{ len $taxonomy }}</span>
    </a>
    {{ end }}
    <a class="category-tag-item category-tag-all" href="/categories/">
      <span class="category-tag-name">All Categories</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>
</div>
