<div class="cookie-consent" id="cookie-consent">
  <div class="cookie-consent-inner">
    <div class="cookie-text"><strong>Privacy Notice:</strong> We use cookies to enhance your experience, analyze traffic, and serve personalized content. By continuing to use this site, you agree to our <a href="/privacy">Privacy Policy</a>.</div>
    <div class="cookie-actions">
      <button class="cookie-accept" id="cookie-accept">Accept All</button>
      <button class="cookie-reject" id="cookie-reject">Reject Non-Essential</button>
    </div>
  </div>
</div>
<script>
(function(){var e=document.getElementById("cookie-consent");if(!e)return;if(localStorage.getItem("cookie_consent")){e.style.display="none";return}document.getElementById("cookie-accept").addEventListener("click",function(){localStorage.setItem("cookie_consent","accepted"),e.style.display="none",typeof gtag=="function"&&gtag("consent","update",{analytics_storage:"granted"})});document.getElementById("cookie-reject").addEventListener("click",function(){localStorage.setItem("cookie_consent","rejected"),e.style.display="none"})})();
</script>
