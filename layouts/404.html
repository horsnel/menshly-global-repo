{{ define "main" }}
<section class="error-page">
  <div class="error-inner">
    <div class="error-code">404</div>
    <div class="error-line"></div>
    <h1 class="error-title">PAGE NOT FOUND</h1>
    <p class="error-desc">The page you're looking for doesn't exist — or it's been moved. But the AI opportunities are still very real. Head back to the homepage and start building.</p>
    <div class="error-actions">
      <a href="/" class="btn-brutal btn-yellow">BACK TO HOME</a>
      <a href="/opportunities/" class="btn-brutal btn-black">BROWSE OPPORTUNITIES</a>
    </div>
    <div class="error-stats">
      <div class="error-stat">
        <span class="error-stat-num">50+</span>
        <span class="error-stat-label">OPPORTUNITIES</span>
      </div>
      <div class="error-stat">
        <span class="error-stat-num">12</span>
        <span class="error-stat-label">GUIDES</span>
      </div>
      <div class="error-stat">
        <span class="error-stat-num">4</span>
        <span class="error-stat-label">PLAYBOOKS</span>
      </div>
    </div>
  </div>
</section>
{{ end }}
