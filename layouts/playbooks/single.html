{{ define "main" }}
<article>
  <div class="article-header">
    <div class="article-category">PLAYBOOK</div>
    <h1 class="article-title">{{ .Title }}</h1>
    <div class="article-meta-bar">
      <span class="article-meta-item">{{ .Date.Format "Jan 02, 2006" }}</span>
      <span class="article-meta-item">{{ .Params.author | default "MENSHLY GLOBAL" }}</span>
      <span class="article-meta-item">{{ .Params.readTime | default "10 MIN READ" }}</span>
      {{ with .Params.price }}
      <span class="article-meta-item" style="background:var(--yellow);">{{ . }}</span>
      {{ end }}
    </div>
  </div>
  <div class="article-content">
    {{ .Content }}
  </div>
  {{ with .Params.price }}
  <div style="padding:0 24px 48px;max-width:760px;">
    <button class="btn-brutal btn-yellow" style="width:100%;justify-content:center;font-size:16px;padding:16px;">
      {{ if eq . "FREE" }}DOWNLOAD NOW{{ else }}BUY NOW — {{ . }}{{ end }}
    </button>
  </div>
  {{ end }}
</article>
{{ end }}
