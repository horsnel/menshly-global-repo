{{ define "main" }}
<article>
  <div class="article-header">
    <div class="article-category">INTELLIGENCE</div>
    <h1 class="article-title">{{ .Title }}</h1>
    <div class="article-meta-bar">
      <span class="article-meta-item">{{ .Date.Format "Jan 02, 2006" }}</span>
      <span class="article-meta-item">{{ .Params.author | default "MENSHLY GLOBAL" }}</span>
      <span class="article-meta-item">{{ .Params.readTime | default "15 MIN READ" }}</span>
      {{ with .Params.difficulty }}
      <span class="article-meta-item" style="background:var(--red);color:var(--white);">{{ . }}</span>
      {{ end }}
    </div>
  </div>
  <div class="article-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
