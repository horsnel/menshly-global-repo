{{ define "main" }}
<div class="page-header">
  <div class="page-badge swiss-badge">{{ .Params.badge | default "AFFILIATES" }}</div>
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Params.description }}
  <p class="page-subtitle">{{ . }}</p>
  {{ end }}
</div>
<div class="page-content">
  {{ .Content }}
</div>
{{ end }}
