name = "menshly-paystack-webhook"
main = "workers/paystack-webhook.js"
compatibility_date = "2024-12-01"

# KV Namespace for purchase records
# Create with: npx wrangler kv namespace create PURCHASES
# Then paste the ID below
[[kv_namespaces]]
binding = "PURCHASES"
id = "7e0f9ae451714bcea91838602f977cd7"

# Environment variables (set via: npx wrangler secret put <KEY>)
# Do NOT put secrets here — use wrangler secret put
# Variables needed:
#   PAYSTACK_SECRET_KEY
#   EMAIL_API_KEY
#   EMAIL_FROM
#   EMAIL_PROVIDER
#   SITE_URL

[vars]
SITE_URL = "https://menshly-global-enz.pages.dev"
EMAIL_PROVIDER = "resend"
EMAIL_FROM = "Menshly Global <onboarding@resend.dev>"
