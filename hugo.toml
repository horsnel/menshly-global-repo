baseURL = "https://kivora.pages.dev/"
languageCode = "en-us"
title = "Kivora | Build. Automate. Monetize. Scale."
[pagination]
  pagerSize = 9

[params]
  description = "Documentary-style founder stories, money-making playbooks, and automation guides for builders who ship."
  author = "Kivora Editorial"
  twitter = "Olhmescraxes1"
  fullWidth = true
  centerHeader = true
  footer = "© 2026 Kivora. Build. Automate. Monetize. Scale."
  breakingHeadline = "New founder stories just dropped — real patterns, raw details, no hype."
  breakingLink = "/stories/"

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[[menu.main]]
  name = "Stories"
  url = "/stories/"
  weight = 1
[[menu.main]]
  name = "Build"
  url = "/categories/build"
  weight = 2
[[menu.main]]
  name = "Automate"
  url = "/categories/automate"
  weight = 3
[[menu.main]]
  name = "Monetize"
  url = "/categories/monetize"
  weight = 4
[[menu.main]]
  name = "Scale"
  url = "/categories/scale"
  weight = 5
[[menu.main]]
  name = "Newsletter"
  url = "/newsletter/"
  weight = 6
