baseURL = "https://menshly-global.pages.dev/"
languageCode = "en-us"
title = "MenshlyGlobal | The 2026 Frontier"
[pagination]
  pagerSize = 9

[params]
  description = "Elite investigative journalism and 2026 global forecasts."
  author = "Menshly Intelligence Board"
  twitter = "Olhmescraxes1"
  fullWidth = true
  centerHeader = true
  footer = "© 2026 MenshlyGlobal Intelligence. All rights reserved."
  breakingHeadline = "Nigeria's public debt hits record high at 159.28 trillion naira, raising fresh concerns about fiscal sustainability."
  breakingLink = "/posts/investors-are-expecting-donald-trump-to-back-down-/"

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

